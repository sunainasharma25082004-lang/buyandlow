# BuyLow — Render Blueprint (3 services)
# 1) buylow-api     → Node backend
# 2) buylow-store   → Customer storefront (static)
# 3) buylow-admin   → Admin panel (static)
#
# After deploy, set env vars in Render dashboard (see server/.env.example).

services:
  # ── Backend API ──────────────────────────────────────────────
  - type: web
    name: buylow-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install --omit=dev
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 30d
      - key: MONGODB_URI
        sync: false
      - key: API_BASE_URL
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: ADMIN_EMAIL
        value: admin@buylow.store
      - key: ADMIN_PASSWORD
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: SERVE_CLIENT
        value: "false"
      - key: GOOGLE_CLIENT_ID
        sync: false

  # ── Customer Store ───────────────────────────────────────────
  # SPA: rewrite all paths to index.html (fixes reload 404 on /products etc.)
  - type: web
    name: buylow-store
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false

  # ── Admin Panel ──────────────────────────────────────────────
  # SPA: rewrite all paths to index.html (fixes reload 404 on /orders etc.)
  - type: web
    name: buylow-admin
    runtime: static
    rootDir: admin
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_STORE_URL
        sync: false